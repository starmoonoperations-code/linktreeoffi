<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starmoon</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y3NL8KPPC6"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040A;--s1:#0E0E14;--s2:#131318;
  --line:rgba(255,255,255,.06);
  --moon:#E8F0FF;--moon2:rgba(180,200,255,.12);
  --acc:#9D6FF5;--acc2:rgba(139,92,246,.12);
  --t1:#EEF0FF;--t2:rgba(238,240,255,.82);--t3:rgba(238,240,255,.55);
  --green:#00E5A0;
}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:14px}

/* Space canvas */
#space{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Subtle glow at top center — lunar light source */
.lunar-light{
  position:fixed;top:-80px;left:50%;transform:translateX(-50%);
  width:500px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(180,200,255,.07),transparent 70%);
  pointer-events:none;z-index:0;
  animation:lunar-breathe 8s ease-in-out infinite;
}
@keyframes lunar-breathe{
  0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.1)}
}

.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:60px 20px 80px;display:flex;flex-direction:column;align-items:center}

/* ── MOON LOGO SYSTEM ── */
.header{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;opacity:0;animation:in .8s .05s cubic-bezier(.16,1,.3,1) forwards}

.moon-system{
  position:relative;
  width:140px;height:140px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
}

/* Outer glow ring */
.moon-halo{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(180,200,255,.06) 0%,transparent 70%);
  animation:halo-pulse 4s ease-in-out infinite;
}
@keyframes halo-pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}

/* Orbiting moon */
.orbit-path{
  position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(180,200,255,.1);
}
.moon-orb{
  position:absolute;
  width:140px;height:140px;
  top:50%;left:50%;
  margin:-70px 0 0 -70px;
  animation:moon-orbit 12s linear infinite;
}
.moon-orb::before{
  content:"";
  position:absolute;top:4px;left:50%;
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#E8F0FF,#B0C0E8 40%,#7080A8 80%,#4050708);
  box-shadow:
    0 0 8px rgba(180,200,255,.6),
    0 0 20px rgba(180,200,255,.3),
    inset -2px -2px 4px rgba(0,0,20,.4);
  transform:translate(-50%,-50%);
}
@keyframes moon-orbit{to{transform:rotate(360deg)}}

/* Second smaller orbit — faster, opposite direction */
.orbit-path2{
  position:absolute;inset:22px;border-radius:50%;
  border:1px solid rgba(180,200,255,.05);
}
.moon-orb2{
  position:absolute;
  width:140px;height:140px;
  top:50%;left:50%;
  margin:-70px 0 0 -70px;
  animation:moon-orbit 7s linear infinite reverse;
}
.moon-orb2::before{
  content:"";
  position:absolute;top:18px;left:50%;
  width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff,#C8D8F0 60%);
  box-shadow:0 0 6px rgba(200,220,255,.5);
  transform:translate(-50%,-50%);
}

/* Logo core — floats with 3D tilt */
.logo-core{
  position:relative;z-index:2;
  width:72px;height:72px;border-radius:20px;
  overflow:hidden;
  background:#09071A;
  border:1px solid rgba(180,200,255,.18);
  box-shadow:
    0 0 0 4px rgba(180,200,255,.05),
    0 0 30px rgba(180,200,255,.12),
    0 0 60px rgba(180,200,255,.05);
  transform-style:preserve-3d;
  animation:logo-float 7s 1s ease-in-out infinite;
  cursor:pointer;
  transition:box-shadow .3s;
}
.logo-core:hover{box-shadow:0 0 0 4px rgba(200,255,0,.08),0 0 40px rgba(200,255,0,.15)}

@keyframes logo-float{
  0%  {transform:translateY(0)   rotateX(3deg)  rotateY(-3deg)}
  25% {transform:translateY(-7px) rotateX(-2deg) rotateY(5deg)}
  50% {transform:translateY(-11px) rotateX(4deg) rotateY(-5deg)}
  75% {transform:translateY(-5px) rotateX(-2deg) rotateY(3deg)}
  100%{transform:translateY(0)   rotateX(3deg)  rotateY(-3deg)}
}

.logo-core img{width:148%;height:148%;object-fit:contain;display:block;margin-left:-24%;margin-top:-20%}

/* Lunar specular */

@keyframes lunar-gleam{0%,100%{opacity:0;transform:scaleX(.3)}50%{opacity:1;transform:scaleX(1)}}

/* Logo shadow */
.logo-shadow{
  width:44px;height:6px;border-radius:50%;
  background:rgba(150,180,255,.2);filter:blur(6px);
  margin:0 auto;
  animation:shadow-sync 7s 1s ease-in-out infinite;
}
@keyframes shadow-sync{
  0%,100%{transform:scaleX(.9);opacity:.5}
  50%{transform:scaleX(.55);opacity:.2}
}

.brand{font-size:12.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--t3);margin-bottom:16px}

.founders{display:flex;gap:20px}
.fc{display:flex;flex-direction:column;align-items:center;gap:5px}
.fa{width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.fa img{width:100%;height:100%;object-fit:cover;display:block}
.fx{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--t3);font-size:9.5px;font-weight:500;text-decoration:none;letter-spacing:.02em;transition:color .18s,border-color .18s,background .18s}
.fx:hover{color:var(--acc);border-color:rgba(200,255,0,.25);background:rgba(139,92,246,.06)}

/* ── STACK ── */
.stack{width:100%;display:flex;flex-direction:column;gap:1px;opacity:0;animation:in .7s .25s cubic-bezier(.16,1,.3,1) forwards}
.row{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--s1);text-decoration:none;color:var(--t1);cursor:pointer;position:relative;overflow:hidden;transition:background .18s,transform .18s}
.row:first-child{border-radius:12px 12px 0 0}
.row:last-child{border-radius:0 0 12px 12px}
.row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc);transform:scaleY(0);transform-origin:center;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.row+.row::after{content:"";position:absolute;top:0;left:18px;right:18px;height:1px;background:var(--line)}
.row:hover{background:var(--s2);transform:translateX(3px)}
.row:hover::before{transform:scaleY(1)}
.row-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:var(--s2)}
.row-ico img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px}
.row-body{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;letter-spacing:-.01em}
.row-desc{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;font-weight:600;padding:4px 9px;border-radius:3px;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.bg-g{background:rgba(0,229,160,.08);color:var(--green);border:1px solid rgba(0,229,160,.15)}
.bg-p{background:rgba(123,92,246,.12);color:#C4B5FD;border:1px solid rgba(139,92,246,.28)}

/* ── ACCORDION ── */
.acc-wrap{width:100%;margin-top:1px;opacity:0;animation:in .7s .38s cubic-bezier(.16,1,.3,1) forwards}
.acc-trigger{width:100%;cursor:pointer;border-radius:12px;background:var(--s1);border:none;padding:0;color:var(--t1);text-align:left;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;transition:background .18s,transform .18s}
.acc-trigger:hover{background:var(--s2);transform:translateX(3px)}
.acc-trigger::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc);transform:scaleY(0);transform-origin:center;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.acc-trigger:hover::before{transform:scaleY(1)}
.acc-wrap.open .acc-trigger{border-radius:12px 12px 0 0;transform:none}
.acc-head{display:flex;align-items:center;gap:14px;padding:16px 18px}
.acc-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:rgba(123,92,246,.12);border:1px solid rgba(139,92,246,.25);display:flex;align-items:center;justify-content:center}
.acc-txt{flex:1;min-width:0}
.acc-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;letter-spacing:-.01em}
.acc-sub{font-size:12px;color:var(--t2)}
.chev{width:28px;height:28px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chev svg{transition:transform .28s cubic-bezier(.4,0,.2,1)}
.acc-wrap.open .chev svg{transform:rotate(180deg)}
.acc-hint{text-align:center;font-size:10.5px;color:rgba(167,139,250,.5);font-weight:500;padding:7px 0 0;letter-spacing:.06em;text-transform:uppercase;transition:opacity .2s}
.acc-wrap.open .acc-hint{opacity:0;height:0;padding:0;overflow:hidden}
.acc-panel{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.acc-wrap.open .acc-panel{max-height:900px}
.acc-body{background:var(--s1);border-radius:0 0 12px 12px;border-top:1px solid var(--line);padding:8px 10px 10px;display:flex;flex-direction:column;gap:2px}
.tool{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:8px;text-decoration:none;color:var(--t1);cursor:pointer;transition:background .15s,transform .18s;position:relative;overflow:hidden}
.tool::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc);transform:scaleY(0);transform-origin:center;transition:transform .2s cubic-bezier(.4,0,.2,1)}
.tool:hover{background:var(--s2);transform:translateX(4px)}
.tool:hover::before{transform:scaleY(1)}
.t-ico{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--s2)}
.t-ico img{width:100%;height:100%;object-fit:cover;border-radius:8px;display:block}
.t-ico-c img{object-fit:contain;width:78%;height:78%;border-radius:0}
.t-body{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:1px;letter-spacing:-.01em}
.t-desc{font-size:11px;color:var(--t2)}
.t-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.t-val{font-size:12.5px;font-weight:700;letter-spacing:-.01em;background:linear-gradient(135deg,#A78BFA,#7B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-tag{font-size:9.5px;font-weight:500;padding:2px 7px;border-radius:3px;color:var(--t3);background:rgba(255,255,255,.04);border:1px solid var(--line);letter-spacing:.03em}
.t-cro{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:3px;color:var(--acc);background:var(--acc2);border:1px solid rgba(139,92,246,.3);letter-spacing:.03em}

.cal{width:100%;margin-top:8px;display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:transparent;border:1px solid var(--line);text-decoration:none;color:var(--t1);cursor:pointer;transition:border-color .18s,background .18s;opacity:0;animation:in .7s .5s cubic-bezier(.16,1,.3,1) forwards}
.cal:hover{border-color:rgba(255,255,255,.12);background:var(--s1)}
.cal-ico{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0;opacity:.55}
.cal-ico img{width:100%;height:100%;object-fit:contain;display:block}
.cal-b{flex:1}
.cal-t{font-size:12px;font-weight:500;color:var(--t2)}
.cal-s{font-size:10.5px;color:var(--t3)}
.cal-btn{font-size:10.5px;font-weight:500;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--t2);flex-shrink:0}

.footer{margin-top:40px;text-align:center;font-size:10.5px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;opacity:0;animation:in .7s .6s cubic-bezier(.16,1,.3,1) forwards}
.footer-logo{display:flex;justify-content:center;margin-bottom:8px;opacity:.15}
.footer-logo img{width:16px;height:16px;border-radius:4px;filter:grayscale(1)}

@keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:420px){.page{padding:48px 16px 64px}}
</style>
</head>

<script>
(function(){
  const cv=document.getElementById('space'),ctx=cv.getContext('2d');
  let stars=[],meteors=[],dust=[];

  function rsz(){cv.width=innerWidth;cv.height=innerHeight}

  function init(){
    // Stars — different sizes, luna-tinted
    stars=[];
    for(let i=0;i<220;i++){
      const bright=Math.random()>.92;
      stars.push({
        x:Math.random()*cv.width,
        y:Math.random()*cv.height,
        r:bright?Math.random()*.9+.4:Math.random()*.45+.15,
        base:Math.random()*.35+.05,
        o:Math.random()*.35+.05,
        d:Math.random()>.5?1:-1,
        s:Math.random()*.04+.008,
        bright
      });
    }
    // Dust particles — lunar dust, slowly rising
    dust=[];
    for(let i=0;i<60;i++){
      dust.push({
        x:Math.random()*cv.width,
        y:cv.height+Math.random()*cv.height,
        r:Math.random()*.4+.1,
        o:Math.random()*.08+.01,
        vy:-(Math.random()*.15+.04),
        vx:(Math.random()-.5)*.06,
      });
    }
  }

  function spawnMeteor(){
    if(Math.random()<.003 && meteors.length<2){
      const x=Math.random()*cv.width*.7;
      meteors.push({
        x,y:-10,
        vx:Math.random()*3+2,
        vy:Math.random()*2+1.5,
        life:1,decay:Math.random()*.015+.008,
        len:Math.random()*80+60,
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);

    // Stars
    stars.forEach(s=>{
      s.o+=s.s*s.d;
      if(s.o>s.base+.3||s.o<s.base-.04)s.d*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      // Luna tint — slight blue-white
      const r=Math.floor(200+s.o*55);
      const g=Math.floor(210+s.o*45);
      const b2=255;
      ctx.fillStyle=`rgba(${r},${g},${b2},${s.o})`;
      ctx.fill();
      // Bright stars get a cross flare
      if(s.bright&&s.o>.3){
        ctx.strokeStyle=`rgba(220,230,255,${s.o*.3})`;
        ctx.lineWidth=.5;
        ctx.beginPath();ctx.moveTo(s.x-s.r*4,s.y);ctx.lineTo(s.x+s.r*4,s.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(s.x,s.y-s.r*4);ctx.lineTo(s.x,s.y+s.r*4);ctx.stroke();
      }
    });

    // Meteor streaks
    spawnMeteor();
    meteors=meteors.filter(m=>m.life>0);
    meteors.forEach(m=>{
      m.x+=m.vx; m.y+=m.vy; m.life-=m.decay;
      const grd=ctx.createLinearGradient(m.x,m.y,m.x-m.vx/m.vy*m.len,m.y-m.len);
      grd.addColorStop(0,`rgba(220,235,255,${m.life*.8})`);
      grd.addColorStop(.3,`rgba(180,210,255,${m.life*.3})`);
      grd.addColorStop(1,'rgba(180,210,255,0)');
      ctx.beginPath();
      ctx.moveTo(m.x,m.y);
      ctx.lineTo(m.x-m.vx/m.vy*m.len,m.y-m.len);
      ctx.strokeStyle=grd;
      ctx.lineWidth=1.5;
      ctx.stroke();
    });

    // Lunar dust
    dust.forEach(d=>{
      d.x+=d.vx; d.y+=d.vy;
      if(d.y<-10){d.y=cv.height+10;d.x=Math.random()*cv.width}
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,215,255,${d.o})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{rsz();init()});
  rsz();init();draw();
})();

// Logo parallax
const logo=document.getElementById('logo3d');
document.addEventListener('mousemove',e=>{
  const mx=(e.clientX/innerWidth-.5)*2,my=(e.clientY/innerHeight-.5)*2;
  logo.style.animation='none';
  logo.style.transform=`rotateY(${mx*16}deg) rotateX(${-my*11}deg) translateY(-4px)`;
});
document.addEventListener('mouseleave',()=>{
  logo.style.animation='logo-float 7s ease-in-out infinite';
  logo.style.transform='';
});
logo.addEventListener('click',()=>{
  logo.style.animation='none';
  logo.style.transition='transform .65s cubic-bezier(.16,1,.3,1)';
  logo.style.transform='rotateY(720deg) scale(1.12)';
  setTimeout(()=>{
    logo.style.transition='';
    logo.style.animation='logo-float 7s ease-in-out infinite';
    logo.style.transform='';
  },700);
});
</script>
